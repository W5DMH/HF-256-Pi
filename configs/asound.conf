# HF-256 ALSA Configuration
# Disables modem PCM type which causes "Unknown PCM cards.pcm.modem" errors
# Card number is updated by setup wizard via update_alsa_config()

pcm.!modem {
    type null
}

ctl.!modem {
    type null
}

# Default device - use built-in audio to avoid conflicts with USB audio
defaults.pcm.card 0
defaults.ctl.card 0
